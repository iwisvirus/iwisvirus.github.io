<!DOCTYPE html>
<html>
  <head>
    <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }} – {{ site.description }}</title>

    {% include meta.html %}

    <!--[if lt IE 9]>
      <script src="http://html5shiv.googlecode.com/svn/trunk/html5.js"></script>
    <![endif]-->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{{ site.baseurl }}/style.css" />
    <style>
      body { font-family: 'JetBrains Mono', 'Courier New', monospace; }
      .terminal, .terminal-header, input, .section-terminal { font-family: 'JetBrains Mono', 'Courier New', monospace; }

      /* Matrix rain canvas */
      #matrix-canvas {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        z-index: -1;
        opacity: 0.03;
        pointer-events: none;
      }

      /* Page fade-in */
      #main { animation: fadeInUp 0.5s ease both; }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(16px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* Glitch on site name */
      .site-name a {
        position: relative;
        display: inline-block;
      }
      .site-name a:hover {
        animation: glitch 0.4s steps(2) infinite;
        color: #22c55e !important;
        text-shadow: none !important;
      }
      @keyframes glitch {
        0%   { text-shadow:  2px 0 #ef4444, -2px 0 #60a5fa; }
        25%  { text-shadow: -2px 0 #ef4444,  2px 0 #60a5fa; }
        50%  { text-shadow:  2px 2px #ef4444, -2px -2px #60a5fa; }
        75%  { text-shadow: -1px 0 #ef4444,  1px 0 #60a5fa; }
        100% { text-shadow:  2px 0 #ef4444, -2px 0 #60a5fa; }
      }

      /* Scanline overlay on all terminal blocks */
      .terminal, .section-terminal, .resume-terminal,
      .projects-terminal, .art-terminal, .story-terminal {
        position: relative;
        overflow: hidden;
      }
      .terminal::after, .section-terminal::after, .resume-terminal::after,
      .projects-terminal::after, .art-terminal::after, .story-terminal::after {
        content: "";
        position: absolute;
        inset: 0;
        background: repeating-linear-gradient(
          to bottom,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.06) 2px,
          rgba(0,0,0,0.06) 4px
        );
        pointer-events: none;
        z-index: 1;
        border-radius: inherit;
      }

      /* Nav link active glow */
      nav a.active {
        color: #22c55e !important;
        text-shadow: 0 0 8px rgba(34,197,94,0.5);
      }

      /* Smooth nav underline hover */
      nav a {
        position: relative;
      }
      nav a::after {
        content: "";
        position: absolute;
        bottom: -3px; left: 0;
        width: 0; height: 1px;
        background: #22c55e;
        transition: width 0.2s;
      }
      nav a:hover::after { width: 100%; }

      /* Footer icons glow on hover */
      .svg-icon:hover path, .svg-icon:hover polygon, .svg-icon:hover rect {
        fill: #22c55e;
        filter: drop-shadow(0 0 4px rgba(34,197,94,0.6));
      }

      /* Scroll progress bar */
      #scroll-bar {
        position: fixed;
        top: 0; left: 0;
        height: 2px;
        width: 0%;
        background: linear-gradient(90deg, #22c55e, #60a5fa);
        z-index: 9999;
        transition: width 0.1s;
        box-shadow: 0 0 8px rgba(34,197,94,0.6);
      }

      /* Animated glowing border on terminals */
      .terminal, .section-terminal, .resume-terminal,
      .projects-terminal, .art-terminal, .story-terminal {
        animation: borderPulse 4s ease-in-out infinite;
      }
      @keyframes borderPulse {
        0%, 100% { box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px #1e2530; }
        50%       { box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px #22c55e22, 0 0 20px rgba(34,197,94,0.05); }
      }

      /* Post cards hover lift */
      .posts > .post {
        transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      }
      .posts > .post:hover {
        transform: translateX(4px);
      }

      /* Animated section headers */
      .r-section, .p-section, .section-label, .category-title {
        position: relative;
        overflow: hidden;
      }
      .r-section::after, .p-section::after {
        content: "";
        position: absolute;
        bottom: 0; left: 0;
        height: 1px;
        width: 0;
        background: linear-gradient(90deg, #22c55e, transparent);
        animation: sectionLine 1.5s ease forwards;
      }
      @keyframes sectionLine {
        to { width: 100%; }
      }

      /* Flicker on load for terminal headers */
      .terminal-header, .r-header, .p-header, .a-header, .s-header {
        animation: flicker 0.15s ease 0.3s both;
      }
      @keyframes flicker {
        0%  { opacity: 1; }
        30% { opacity: 0.4; }
        60% { opacity: 1; }
        80% { opacity: 0.6; }
        100%{ opacity: 1; }
      }

      /* Skill tag glow on hover */
      .skill-tag:hover {
        border-color: #22c55e88;
        box-shadow: 0 0 8px rgba(34,197,94,0.3);
        color: #4ade80;
      }

      /* Project card border animate on hover */
      .project-card, .art-card {
        transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
      }
    </style>
    <link rel="alternate" type="application/rss+xml" title="{{ site.name }} - {{ site.description }}" href="{{ site.baseurl }}/feed.xml" />
  </head>

  <div id="scroll-bar"></div>
  <canvas id="matrix-canvas"></canvas>

  <script>
  document.addEventListener("DOMContentLoaded", function () {
    // Disclaimer close
    const closeBtn = document.getElementById("closeDisclaimer");
    const disclaimer = document.getElementById("disclaimerBox");
    if (closeBtn && disclaimer) {
      closeBtn.addEventListener("click", () => disclaimer.style.display = "none");
    }

    // Active nav link
    const links = document.querySelectorAll("nav a");
    links.forEach(link => {
      if (link.href === window.location.href || window.location.pathname.startsWith(new URL(link.href).pathname) && new URL(link.href).pathname !== "/") {
        link.classList.add("active");
      }
    });

    // Scroll progress bar
    const scrollBar = document.getElementById("scroll-bar");
    window.addEventListener("scroll", () => {
      const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
      scrollBar.style.width = pct + "%";
    });

    // Matrix rain
    const canvas = document.getElementById("matrix-canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    window.addEventListener("resize", () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      cols = Math.floor(canvas.width / fontSize);
      drops = Array(cols).fill(1);
    });

    const fontSize = 14;
    let cols = Math.floor(canvas.width / fontSize);
    let drops = Array(cols).fill(1);
    const chars = "01アイウエオカキクケコ";

    function drawMatrix() {
      ctx.fillStyle = "rgba(13,17,23,0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#22c55e";
      ctx.font = fontSize + "px monospace";
      for (let i = 0; i < drops.length; i++) {
        const char = chars[Math.floor(Math.random() * chars.length)];
        ctx.fillText(char, i * fontSize, drops[i] * fontSize);
        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      }
    }
    setInterval(drawMatrix, 60);
  });
  </script>

  <body>
    <div class="wrapper-masthead">
      <div class="container">
        <header class="masthead clearfix">
          <a href="{{ site.baseurl }}/" class="site-avatar"><img src="{{ site.avatar }}" /></a>

          <div class="site-info">
            <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.name }}</a></h1>
            <p class="site-description">{{ site.description }}</p>
          </div>

          <nav>
            <a href="{{ site.baseurl }}/about">About</a>
            <a href="{{ site.baseurl }}/resume">Resume</a>
            <a href="{{ site.baseurl }}/projects">Projects</a>
            <a href="{{ site.baseurl }}/story">Story</a>
            <a href="{{ site.baseurl }}/contact">Contact</a>
          </nav>
        </header>
      </div>
    </div>

    <div id="main" role="main" class="container">
      {{ content }}
    </div>

    <div class="wrapper-footer">
      <div class="container">
        <footer class="footer">
          {% include svg-icons.html %}
        </footer>
      </div>
    </div>

    {% include analytics.html %}
  </body>
</html>
